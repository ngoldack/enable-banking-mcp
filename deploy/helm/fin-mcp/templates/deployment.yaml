{{- $secretName := include "fin-mcp.secretName" . -}}
{{- $hasSecrets := include "fin-mcp.hasSecrets" . -}}
{{- $hasKey := or .Values.secrets.existingSecret .Values.secrets.privateKeyContent -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fin-mcp.fullname" . }}
  labels:
    {{- include "fin-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fin-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if not .Values.config.existingConfigMap }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if and $hasSecrets (not .Values.secrets.existingSecret) }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fin-mcp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: fin-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server", "--config", "/etc/fin-mcp/config.json"]
          ports:
            - name: http
              containerPort: {{ .Values.config.mcp.port }}
          env:
            # Non-secret settings come from the mounted config.json (ConfigMap).
            # The secrets are injected here from the Secret, overriding the
            # (omitted) values in config.json via MCP_* env layering.
            {{- if or .Values.secrets.existingSecret .Values.secrets.bearerToken }}
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: bearer-token
                  optional: true
            {{- end }}
            {{- if and (eq .Values.config.mcp.cache.type "valkey") (or .Values.secrets.existingSecret .Values.secrets.valkeyPassword) }}
            - name: MCP_CACHE_VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: valkey-password
                  optional: true
            {{- end }}
            {{- if .Values.otel.exporterEndpoint }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/fin-mcp
              readOnly: true
            {{- if $hasKey }}
            - name: keys
              mountPath: /etc/fin-mcp/keys
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        # Non-secret config (provider topology + connections) from a ConfigMap.
        - name: config
          configMap:
            name: {{ .Values.config.existingConfigMap | default (include "fin-mcp.fullname" .) }}
        {{- if $hasKey }}
        # Private key mounted from the Secret at the configured private_key_path.
        - name: keys
          secret:
            secretName: {{ $secretName }}
            optional: true
            items:
              - key: private.key
                path: private.key
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
