apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fin-mcp.fullname" . }}
  labels:
    {{- include "fin-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fin-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if not .Values.config.existingSecret }}
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fin-mcp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: fin-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server", "--config", "/etc/fin-mcp/config.json"]
          ports:
            - name: http
              containerPort: {{ .Values.config.mcp.port }}
          env:
            # All settings come from the mounted config.json (a Secret). Only
            # telemetry is wired via env here.
            {{- if .Values.otel.exporterEndpoint }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/fin-mcp
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        # The whole config (config.json + optional private.key) comes from a
        # single Secret — chart-rendered or the operator-supplied existingSecret.
        - name: config
          secret:
            secretName: {{ .Values.config.existingSecret | default (include "fin-mcp.fullname" .) }}
            items:
              - key: config.json
                path: config.json
              {{- if and (not .Values.config.existingSecret) .Values.privateKey.content }}
              - key: private.key
                path: keys/private.key
              {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
