apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fin-mcp.fullname" . }}
  labels:
    {{- include "fin-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fin-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fin-mcp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: fin-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server", "--config", "/etc/fin-mcp/config.json"]
          ports:
            - name: http
              containerPort: {{ .Values.mcp.port }}
          env:
            - name: MCP_TRANSPORT
              value: "sse"
            - name: MCP_PORT
              value: {{ .Values.mcp.port | quote }}
            - name: MCP_ACCESS_MODE
              value: {{ .Values.mcp.accessMode | quote }}
            - name: MCP_LOG_FORMAT
              value: {{ .Values.mcp.logFormat | quote }}
            - name: MCP_LOG_LEVEL
              value: {{ .Values.mcp.logLevel | quote }}
            - name: MCP_CACHE_PATH
              value: "/var/cache/fin-mcp/cache.db"
            {{- if or .Values.mcp.bearerToken .Values.mcp.existingSecret }}
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcp.existingSecret | default (include "fin-mcp.fullname" .) }}
                  key: {{ .Values.mcp.bearerTokenKey }}
            {{- end }}
            {{- if .Values.otel.exporterEndpoint }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/fin-mcp
              readOnly: true
            - name: cache
              mountPath: /var/cache/fin-mcp
            {{- if .Values.privateKey.content }}
            - name: keys
              mountPath: /etc/fin-mcp/keys
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "fin-mcp.fullname" . }}
        - name: cache
          emptyDir: {}
        {{- if .Values.privateKey.content }}
        - name: keys
          secret:
            secretName: {{ include "fin-mcp.fullname" . }}
            items:
              - key: private.key
                path: private.key
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
