{{- if and (not .Values.secrets.existingSecret) (or .Values.secrets.bearerToken .Values.secrets.valkeyPassword .Values.secrets.privateKeyContent) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-secrets" (include "fin-mcp.fullname" .) }}
  labels:
    {{- include "fin-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.bearerToken }}
  bearer-token: {{ .Values.secrets.bearerToken | quote }}
  {{- end }}
  {{- if .Values.secrets.valkeyPassword }}
  valkey-password: {{ .Values.secrets.valkeyPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.privateKeyContent }}
  private.key: |
    {{- .Values.secrets.privateKeyContent | nindent 4 }}
  {{- end }}
{{- end }}
