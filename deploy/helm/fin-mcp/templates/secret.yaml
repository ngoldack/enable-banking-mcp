{{- if or (and .Values.mcp.bearerToken (not .Values.mcp.existingSecret)) .Values.privateKey.content }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fin-mcp.fullname" . }}
  labels:
    {{- include "fin-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.mcp.bearerToken (not .Values.mcp.existingSecret) }}
  {{ .Values.mcp.bearerTokenKey }}: {{ .Values.mcp.bearerToken | quote }}
  {{- end }}
  {{- if .Values.privateKey.content }}
  private.key: |
    {{- .Values.privateKey.content | nindent 4 }}
  {{- end }}
{{- end }}
