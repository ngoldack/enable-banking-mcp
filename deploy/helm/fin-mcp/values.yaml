# Default values for fin-mcp.
# The chart deploys the MCP server over the SSE (HTTP) transport — the sensible
# choice for Kubernetes. Stdio is for local MCP clients, not a Deployment.

replicaCount: 1

image:
  # Single, unprivileged image. Observability is in-process via the OTel SDK.
  repository: ghcr.io/ngoldack/fin-mcp
  tag: latest
  pullPolicy: IfNotPresent

# OpenTelemetry (in-process Go SDK — traces + metrics over OTLP/HTTP).
# Set exporterEndpoint to your collector to enable telemetry; leave empty to
# disable it (zero overhead). No elevated privileges are required.
otel:
  exporterEndpoint: "" # e.g. http://otel-collector:4318
  serviceName: fin-mcp

# Non-sensitive configuration -> ConfigMap (mounted as config.json). This holds
# the provider topology and connections. Connection session IDs live here: an
# Enable Banking session is only usable when requests are signed with the app
# private key (an RS256 JWT), so a session ID is inert on its own. The actual
# secrets live under `secrets:` below.
config:
  existingConfigMap: "" # ConfigMap with a `config.json` key (skips chart rendering)

  providers:
    - name: enable-banking
      type: enable-banking
      enable_banking:
        app_id: ""
        # The private key is mounted from the Secret (see secrets.privateKeyContent).
        private_key_path: /etc/fin-mcp/keys/private.key
        environment: SANDBOX
        # redirect_url is only needed for setup (SCA) and payment initiation.
        # Omit it for a read-only deployment with already-authorized sessions.
        redirect_url: ""
      connections: []

  mcp:
    accessMode: ReadOnly # ReadOnly | InternalOnly | Unrestricted
    port: 8090
    logFormat: json # text | json
    logLevel: info
    cache:
      type: memory # none | memory | valkey
      ttlMinutes: 5
      # External Valkey/Redis only — this chart does NOT deploy a Valkey server.
      # The password is a secret (see secrets.valkeyPassword).
      valkey:
        address: "" # host:port of your external valkey
        username: ""
        db: 0
        tls: false # set true when your valkey terminates TLS

# Sensitive values -> Secret. Injected as env (bearer token, valkey password) or
# mounted as a file (private key). Provide them out-of-band via
# secrets.existingSecret (keys: bearer-token, valkey-password, private.key) so
# nothing sensitive passes through Helm values, CI logs, or release history.
secrets:
  existingSecret: "" # Secret with keys: bearer-token, valkey-password, private.key
  bearerToken: "" # SSE auth token (empty disables auth; loopback only)
  valkeyPassword: "" # external valkey password
  privateKeyContent: "" # Enable Banking private key PEM, mounted at private_key_path

service:
  type: ClusterIP
  port: 8090

resources: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
