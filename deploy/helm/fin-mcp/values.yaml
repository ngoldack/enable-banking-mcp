# Default values for fin-mcp.
# The chart deploys the MCP server over the SSE (HTTP) transport — the sensible
# choice for Kubernetes. Stdio is for local MCP clients, not a Deployment.

replicaCount: 1

image:
  # Single, unprivileged image. Observability is in-process via the OTel SDK.
  repository: ghcr.io/ngoldack/fin-mcp
  tag: latest
  pullPolicy: IfNotPresent

# OpenTelemetry (in-process Go SDK — traces + metrics over OTLP/HTTP).
# Set exporterEndpoint to your collector to enable telemetry. Leave it empty to
# disable it entirely (the SDK installs nothing and runs at zero overhead). No
# elevated privileges are required.
otel:
  exporterEndpoint: "" # e.g. http://otel-collector:4318
  serviceName: fin-mcp

mcp:
  port: 8090
  accessMode: ReadOnly # ReadOnly | InternalOnly | Unrestricted
  cacheTTLMinutes: 5
  logFormat: json # text | json
  logLevel: info
  # Bearer token for SSE auth. Three options, in order of preference:
  #   1. existingSecret: reference a Secret you created out-of-band — the token
  #      never passes through Helm values, CI logs, or release history. PREFERRED.
  #   2. bearerToken: inline value (dev only; ends up in the Helm release Secret).
  #   3. neither: authentication is DISABLED — only safe on loopback. The server
  #      logs a warning at startup. Always run behind TLS regardless.
  existingSecret: "" # name of a pre-existing Secret holding the token
  bearerTokenKey: bearer-token # key within the Secret
  bearerToken: ""

# Provider topology (rendered into a ConfigMap as config.json). Secrets do NOT
# belong here — reference the mounted key via private_key_path.
config:
  providers:
    - name: enable-banking
      type: enable-banking
      enable_banking:
        app_id: ""
        private_key_path: /etc/fin-mcp/keys/private.key
        environment: SANDBOX
        redirect_url: http://localhost:8080/callback
        connections: []

# Enable Banking application private key (PEM). Stored in a Secret and mounted at
# /etc/fin-mcp/keys/private.key. Leave empty to manage the Secret yourself.
privateKey:
  content: ""

service:
  type: ClusterIP
  port: 8090

resources: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
