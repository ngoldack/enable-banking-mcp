version: '3'

tasks:
  default:
    desc: Lists available tasks
    cmds:
      - task --list

  tidy:
    desc: Tidies up Go dependencies
    cmds:
      - go mod tidy

  build:
    desc: Builds the fin-mcp executable
    cmds:
      - go build -o fin-mcp ./cmd/fin-mcp

  setup:
    desc: Runs the interactive TUI setup wizard
    cmds:
      - go run ./cmd/fin-mcp setup

  server:
    desc: Runs the Enable Banking MCP server (requires config.json)
    cmds:
      - go run ./cmd/fin-mcp server --config config.json

  tui:
    desc: Runs the beautiful Bubble Tea TUI Pocket Dashboard (requires config.json)
    cmds:
      - go run ./cmd/fin-mcp tui --config config.json

  clean:
    desc: Deletes compiled binaries and temporary certificates
    cmds:
      - rm -f fin-mcp
      - echo "Clean completed"
