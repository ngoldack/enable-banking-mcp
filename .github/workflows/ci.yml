name: CI & Secure Delivery Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # Required to push images to GHCR
  id-token: write        # CRITICAL: Required for Cosign keyless signing via OIDC!
  security-events: write # Required to upload Trivy SARIF reports

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned for reproducibility — avoids surprise failures from new checks in "latest".
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run Tests with gotestsum
        run: |
          set -o pipefail
          gotestsum --junitfile junit-report.xml --format pkgname -- -race ./... 2>&1 | tee test-output.txt

      - name: Publish test summary
        if: always()
        run: |
          {
            echo "## 🧪 Test Results"
            echo ""
            echo '```'
            tail -n 40 test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JUnit Test Results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: junit-test-results
          path: junit-report.xml

  build-and-deliver:
    name: Secure Build & Deliver
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      # 1. Build ONCE to an OCI layout directory that carries SBOM + SLSA
      #    provenance attestations. The very same artifact is scanned below and,
      #    on main, pushed verbatim — no rebuild, no separate scan image.
      #    `tar=false` is required: Trivy's --input reads an OCI *directory*, and
      #    skopeo reads it via the oci: transport.
      - name: Build image (OCI layout, attested)
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          outputs: type=oci,dest=./oci-image,tar=false
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Scan the exact built artifact (filesystem + Go binary) on every event.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          input: ./oci-image
          format: sarif
          output: trivy.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy

      # 3. On main only: log in (for Cosign's registry write), push the SAME
      #    attested OCI artifact with skopeo (--all preserves the image plus its
      #    SBOM/provenance attestations), then Cosign-sign the index by digest.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push attested image & sign (Cosign)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          command -v skopeo >/dev/null 2>&1 || {
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends skopeo
          }

          # Push the immutable SHA tag and capture the pushed index digest.
          skopeo copy --all --digestfile=digest.txt \
            oci:./oci-image \
            "docker://${IMAGE}:${SHA_TAG}" \
            --dest-creds "${GHCR_USER}:${GHCR_TOKEN}"
          DIGEST="$(cat digest.txt)"
          echo "Pushed ${IMAGE}:${SHA_TAG} @ ${DIGEST}"

          # Move the :latest tag to the same digest (cheap server-side copy).
          skopeo copy --all \
            "docker://${IMAGE}:${SHA_TAG}" \
            "docker://${IMAGE}:latest" \
            --src-creds "${GHCR_USER}:${GHCR_TOKEN}" \
            --dest-creds "${GHCR_USER}:${GHCR_TOKEN}"

          # Sign the index digest — covers both tags and all attestations.
          cosign sign --yes "${IMAGE}@${DIGEST}"

